# ============================================
# CONFIGURAÇÕES BÁSICAS DO SPRING BOOT
# ============================================

# Porta do servidor (padrão é 8080)
server.port=8080
spring.main.banner-mode=off

# Nome da aplicação
spring.application.name=appfood

# Modo de desenvolvimento (mostra mais logs)
#spring.profiles.active=dev

# Mostra SQL gerado pelo Hibernate no console (MUITO útil para debug!)
spring.jpa.show-sql=true

# Formata o SQL no console para melhor leitura
spring.jpa.properties.hibernate.format_sql=true

# Estratégia de atualização do schema do banco:
# - create: CRIA tabelas ao iniciar (APAGA dados existentes!) ⚠️
# - create-drop: Cria ao iniciar, APAGA ao encerrar ⚠️
# - update: Atualiza schema SEM apagar dados (ideal para desenvolvimento)
# - validate: Só valida se o schema corresponde às entidades (não altera)
# - none: Não faz nada
#spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

#============================================
# CONFIGURAÇÃO DO BANCO DE DADOS - MYSQL (PRODUÇÃO)
# ============================================
# Para usar MySQL em produção, crie um arquivo application-prod.properties
# com estas configurações e ative o perfil "prod"
#
# URL de conexão como Banco de Dados
spring.datasource.url=jdbc:mysql://localhost:3306/appfood?useSSL=false&serverTimezone=UTC

# Credenciais do MySQL
spring.datasource.username=root
spring.datasource.password=123456

# Configuração do Hibernate JPA
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# 'update' faz com que o Java valide se as tabelas existem. Se você mudar algo no Java, ele tenta alterar o SQL.
spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# LOGGING (REGISTRO DE LOGS)
# ============================================

# Nível geral de log
logging.level.root=INFO

# Nível de log específico para nosso pacote (mais detalhado)
logging.level.com.pizzaria=DEBUG

# Logs do Spring Web (requisições HTTP)
logging.level.org.springframework.web=DEBUG

# Logs do Hibernate (SQL executado)
logging.level.org.hibernate.SQL=DEBUG

# Logs dos parâmetros bindados nas queries (valores das variáveis)
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
